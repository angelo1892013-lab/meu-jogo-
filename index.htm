<!DOCTYPE html>
<html>
<body style="text-align:center; font-family:Arial;">

<h1>🎮 Click Game</h1>

<p>Clica o mais rápido possível!</p>

<h2>Pontos: <span id="pontos">0</span></h2>

<button onclick="clicar()" style="padding:20px; font-size:20px;">
  CLICA!
</button>

<script>
let pontos = 0;

function clicar(){
  pontos++;
  document.getElementById("pontos").innerText = pontos;
}
</script>

</body>
</html>
