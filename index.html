<h1>🎮 Clica rápido!</h1>

<p>⏱️ Tempo: <span id="tempo">10</span></p>
<p>🏆 Pontos: <span id="pontos">0</span></p>

<button onclick="clicar()">CLICA AQUI!</button>

<p id="msg"></p>

<script>
let tempo = 10;
let pontos = 0;
let gameOver = false;

let timer = setInterval(() => {
  if (gameOver) return;

  tempo--;
  document.getElementById("tempo").innerText = tempo;

  if (tempo <= 0) {
    gameOver = true;
    clearInterval(timer);
    document.getElementById("msg").innerText =
      "⛔ Fim do jogo! Fizeste " + pontos + " pontos";
  }
}, 1000);

function clicar() {
  if (gameOver) return;

  pontos++;
  document.getElementById("pontos").innerText = pontos;
}
</script>
