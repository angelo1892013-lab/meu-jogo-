



<!DOCTYPE html>
<html>
<head>
  <title>Jogo Novo</title>
</head>

<body>

<h1>🎮 Novo Jogo</h1>

<p>⏱️ Tempo: <span id="tempo">10</span></p>
<p>👆 Cliques: <span id="cliques">0</span></p>

<button onclick="clicar()">CLICA AQUI!</button>
<button onclick="reiniciar()">🔄 Repetir</button>

<p id="msg"></p>

<script>
let tempoInicial = 10;
let tempo = tempoInicial;
let cliques = 0;
let gameOver = false;
let timer;

function iniciar() {
  clearInterval(timer);

  tempo = tempoInicial;
  cliques = 0;
  gameOver = false;

  document.getElementById("tempo").innerText = tempo;
  document.getElementById("cliques").innerText = cliques;
  document.getElementById("msg").innerText = "";

  timer = setInterval(() => {

    if (tempo <= 0) {
      clearInterval(timer);
      gameOver = true;
      document.getElementById("tempo").innerText = 0;
      document.getElementById("msg").innerText =
        "⛔ Fim do jogo! Fizeste " + cliques + " cliques";
      return;
    }

    tempo--;
    document.getElementById("tempo").innerText = tempo;

  }, 1000);
}

function clicar() {
  if (gameOver) return;

  cliques++;
  document.getElementById("cliques").innerText = cliques;

  // 🔊 som simples
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}

function reiniciar() {
  iniciar();
}

iniciar();
</script>

</body>
</html>
