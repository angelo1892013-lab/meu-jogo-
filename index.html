
<h1>🎮 Clica Rápido!</h1>

<p>⏱️ Tempo: <span id="tempo">10</span></p>
<p>👆 Cliques: <span id="cliques">0</span></p>

<button onclick="clicar()">CLICA AQUI!</button>

<p id="msg"></p>

<script>
let tempo = 10;
let cliques = 0;
let gameOver = false;

let timer = setInterval(() => {
  tempo--;

  if (tempo <= 0) {
    tempo = 0; // 👈 isto impede ficar negativo
    gameOver = true;
    clearInterval(timer);

    document.getElementById("msg").innerText =
      "⛔ Tempo acabou! Fizeste " + cliques + " cliques";
  }

  document.getElementById("tempo").innerText = tempo;
}, 1000);

function clicar() {
  if (gameOver) return;

  cliques++;
  document.getElementById("cliques").innerText = cliques;
}
</script>
